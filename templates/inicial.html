<!DOCTYPE html>
<html lang="pt-BR">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Acadêmico — Alfa Profissionalizantes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="pagina-inicial">

  <div class="container-inicial">

    <div class="logo-wrapper">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Alfa Profissionalizantes" class="logo"/>
    </div>

    <h1 class="titulo">Portal Acadêmico</h1>
    <p class="subtitulo">Acesse sua conta para continuar</p>

    <div class="botoes-perfil">

      <a href="{{ url_for('auth.login_professor') }}" class="btn-perfil">
        <span class="icone-perfil">
          <!-- ícone professor -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="28" height="28">
            <path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4V9h2V3zm-2 2v2h-2V5h2zM11 1l-5 3h10l-5-3z"/>
            <rect x="11" y="17" width="2" height="3"/>
            <rect x="8" y="20" width="8" height="2"/>
          </svg>
        </span>
        <span class="label-perfil">PROFESSOR</span>
      </a>

      <a href="{{ url_for('auth.login_aluno') }}" class="btn-perfil">
        <span class="icone-perfil">
          <!-- ícone aluno -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="28" height="28">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </span>
        <span class="label-perfil">ALUNO</span>
      </a>

    </div>

    <p class="rodape">© 2024 Alfa Profissionalizantes. Todos os direitos reservados.</p>

  </div>

</body>
</html>
