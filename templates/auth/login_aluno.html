<!DOCTYPE html>
<html lang="pt-BR">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Aluno — Alfa Profissionalizantes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="pagina-login">

  <div class="container-login">

    <div class="logo-wrapper">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Alfa Profissionalizantes" class="logo"/>
    </div>

    <h1 class="titulo">Seja bem-vindo!</h1>
    <p class="subtitulo azul-claro">Por favor identifique-se.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alerta alerta-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login_aluno') }}" class="form-login">

      <div class="campo">
        <span class="campo-icone">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#5b8adb" width="20" height="20">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </span>
        <input type="text" name="matricula" placeholder="Matrícula" required autocomplete="off"/>
      </div>

      <div class="campo">
        <span class="campo-icone">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#5b8adb" width="20" height="20">
            <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
          </svg>
        </span>
        <input type="password" name="senha" placeholder="Senha" required/>
      </div>

      <a href="#" class="link-esqueceu">Esqueceu sua senha?</a>

      <button type="submit" class="btn-entrar">Entrar</button>

    </form>

    <p class="dica-login">Use sua matrícula para efetuar o login.</p>

    <a href="{{ url_for('inicial') }}" class="link-voltar">← Voltar</a>

  </div>

</body>
</html>
